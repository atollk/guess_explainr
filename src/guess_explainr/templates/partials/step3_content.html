<script>
  window.dispatchEvent(new CustomEvent('url-processed', {
    detail: { detectedCountryId: '{{ detected_country.id }}', countries: '{{ available_countries_json }}' }
  }));
</script>
<div>
  <div class="flex items-start gap-4 mb-4">
    {% if panorama_available %}
    <div x-data>
      <img
        src="/api/panorama-image?v={{ panorama_token }}"
        @click="$refs.panoramaDialog.showModal()"
        class="w-40 h-28 object-cover rounded-lg cursor-pointer hover:opacity-80 transition-opacity flex-shrink-0"
        alt="Street View panorama"
      />
      <dialog x-ref="panoramaDialog" class="modal">
        <div class="modal-box max-w-5xl p-2">
          <img src="/api/panorama-image?v={{ panorama_token }}" class="w-full rounded-lg" alt="Street View panorama" />
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
      </dialog>
    </div>
    {% endif %}
    <div>
      <span class="text-sm font-semibold text-base-content/60 uppercase tracking-wide">Detected country</span>
      <div class="text-lg mt-1">{{ detected_country.display_name }}</div>
    </div>
  </div>

  <div class="mb-4">
    <p class="text-sm text-base-content/60 mb-2">Select countries to compare (max 4):</p>
    <div class="flex flex-wrap gap-2">
      {% for c in available_countries %}
      <button
        type="button"
        class="rounded-xs badge cursor-pointer"
        :class="selectedCountries.includes('{{ c.id }}') ? 'badge-primary' : 'badge-outline badge-ghost'"
        @click="toggleCountry('{{ c.id }}')"
      >{{ c.display_name }}</button>
      {% endfor %}
    </div>
  </div>

  <form @submit.prevent="doCompare($el)">
    <div class="form-control mb-4">
      <label class="label" for="questions"><span class="label-text">Custom questions (optional)</span></label>
      <textarea id="questions" name="questions" class="textarea textarea-bordered w-full" rows="3"
        placeholder="for example: How can I separate Sweden from Norway?"></textarea>
    </div>
    <div class="flex items-center gap-3 flex-wrap">
      <button
        type="submit"
        class="btn btn-primary"
        :disabled="selectedCountries.length === 0"
      >
        Compare
      </button>
      <span id="compare-error" class="text-error text-sm"></span>
      <span id="compare-spinner" class="loading loading-spinner loading-sm" style="display:none"></span>
    </div>
  </form>
</div>
