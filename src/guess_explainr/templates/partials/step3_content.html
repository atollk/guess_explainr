<script>
  window.dispatchEvent(new CustomEvent('url-processed', {
    detail: { detectedCountryId: '{{ detected_country.id }}', countries: '{{ available_countries_json }}' }
  }));
</script>
<div>
  <div class="flex items-center gap-2 mb-4">
    <span class="text-sm font-semibold text-base-content/60 uppercase tracking-wide">Detected country</span>
    <span class="text-lg">{{ detected_country.display_name }}</span>
  </div>

  <div class="mb-4">
    <p class="text-sm text-base-content/60 mb-2">Select countries to compare (max 4):</p>
    <div class="flex flex-wrap gap-2">
      {% for c in available_countries %}
      <button
        type="button"
        class="rounded-xs badge cursor-pointer"
        :class="selectedCountries.includes('{{ c.id }}') ? 'badge-primary' : 'badge-outline badge-ghost'"
        @click="toggleCountry('{{ c.id }}')"
      >{{ c.display_name }}</button>
      {% endfor %}
    </div>
  </div>

  <form
    hx-post="/api/compare"
    hx-target="#step4-area"
    hx-swap="innerHTML"
    hx-indicator="#compare-spinner"
    hx-ext="json-enc"
    :hx-vals="JSON.stringify({compare_countries: selectedCountries})"
  >
    <div class="form-control mb-4">
      <label class="label" for="questions"><span class="label-text">Custom questions (optional)</span></label>
      <textarea id="questions" name="questions" class="textarea textarea-bordered w-full" rows="3"
        placeholder="for example: How can I separate Sweden from Norway?"></textarea>
    </div>
    <div class="flex items-center gap-3">
      <button
        type="submit"
        class="btn btn-primary"
        :disabled="selectedCountries.length === 0"
      >
        Compare
      </button>
      <span id="compare-spinner" class="htmx-indicator loading loading-spinner loading-sm"></span>
    </div>
  </form>
</div>
