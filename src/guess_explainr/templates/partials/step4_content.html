<div class="prose max-w-none mb-6">
  <div
    hx-ext="sse"
    sse-connect="{{ stream_url }}"
    sse-swap="msg"
    hx-swap="innerHTML"
    sse-close="done"
  >
    <div class="flex items-center gap-2 text-sm text-base-content/60">
      <span class="loading loading-dots loading-xs"></span>
      <span>Analyzing…</span>
    </div>
  </div>
</div>

<div class="divider"></div>

<p class="text-warning">Chat is not implemented yet</p>

<div id="chat-messages" class="flex flex-col gap-3 mb-4 max-h-[36rem] overflow-y-auto scroll-smooth">
</div>

<form
  @submit.prevent="
    const msg = $el.querySelector('[name=message]').value.trim();
    if (!msg) return;
    const context = `{{ context | e }}`;
    const url = '/api/chat?message=' + encodeURIComponent(msg) + '&context=' + encodeURIComponent(context);
    $dispatch('send-chat', { url, message: msg });
    $el.querySelector('[name=message]').value = '';
  "
  class="flex gap-2"
>
  <input
    name="message"
    type="text"
    class="input input-bordered flex-1"
    placeholder="Ask a follow-up question…"
    autocomplete="off"
  />
  <button type="submit" class="btn btn-primary">Send</button>
</form>
