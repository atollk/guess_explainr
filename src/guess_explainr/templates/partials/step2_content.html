<p class="text-base-content/60 text-sm mb-4">
    Copy any Google Maps URL of a location you want to learn about.
</p>

<form
        hx-post="/api/process-url"
        hx-target="#step3-area"
        hx-swap="innerHTML"
        hx-indicator="#url-spinner"
        hx-ext="json-enc"
        hx-on::after-request="
    if (event.detail.successful) {
      step = 3;
      document.getElementById('url-error').textContent = '';
    } else {
      document.getElementById('url-error').textContent =
        JSON.parse(event.detail.xhr.responseText)?.detail ?? 'An unexpected error occurred.';
    }
  "
>
    <div class="form-control mb-4">
        <input
                type="url"
                name="url"
                class="input input-bordered w-full"
                placeholder="https://www.google.com/maps/..."
                required
        />
    </div>
    <div class="mb-4">
        <button
                type="button"
                class="btn btn-ghost btn-sm"
                @click="$el.closest('form').querySelector('[name=url]').value = 'https://www.google.com/maps/@38.0691925,22.2390295,3a,90y,302.4h,92.61t/data=!3m7!1e1!3m5!1sC7dD4mGuuHHm6SjUq80gtw!2e0!6shttps:%2F%2Fstreetviewpixels-pa.googleapis.com%2Fv1%2Fthumbnail%3Fcb_client%3Dmaps_sv.tactile%26w%3D900%26h%3D600%26pitch%3D-2.612560000000002%26panoid%3DC7dD4mGuuHHm6SjUq80gtw%26yaw%3D302.40146!7i16384!8i8192?entry=ttu&g_ep=EgoyMDI2MDEwNC4wIKXMDSoASAFQAw%3D%3D'"
        >Use an example
        </button>
    </div>
    <div class="flex items-center gap-3 flex-wrap">
        <button type="submit" class="btn btn-primary">Analyze Location</button>
        <span id="url-spinner" class="htmx-indicator loading loading-spinner loading-sm"></span>
        <span id="url-error" class="text-error text-sm"></span>
    </div>
</form>
