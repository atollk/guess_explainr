<div x-data x-init="$dispatch('url-processed', { country: '{{ country }}', countries: {{ available_countries | tojson }} })">
  <div class="flex items-center gap-2 mb-4">
    <span class="text-sm font-semibold text-base-content/60 uppercase tracking-wide">Detected country</span>
    <span class="badge badge-primary badge-lg">{{ country }}</span>
  </div>

  <div class="mb-4">
    <p class="text-sm text-base-content/60 mb-2">Select countries to compare (max 4):</p>
    <div class="flex flex-wrap gap-2">
      {% for c in available_countries %}
      <button
        type="button"
        class="badge badge-outline cursor-pointer"
        :class="selectedCountries.includes('{{ c }}') ? 'badge-primary' : 'badge-ghost'"
        @click="toggleCountry('{{ c }}')"
      >{{ c }}</button>
      {% endfor %}
    </div>
  </div>

  <form
    hx-post="/api/compare"
    hx-target="#step4-area"
    hx-swap="innerHTML"
    hx-indicator="#compare-spinner"
  >
    <input type="hidden" name="country" value="{{ country }}" />
    <template x-for="c in selectedCountries" :key="c">
      <input type="hidden" name="compare_countries" :value="c" />
    </template>
    <div class="form-control mb-4">
      <label class="label"><span class="label-text">Custom questions (optional)</span></label>
      <textarea name="questions" class="textarea textarea-bordered w-full" rows="3"
        placeholder="e.g. Compare their healthcare systems…"></textarea>
    </div>
    <div class="flex items-center gap-3">
      <button
        type="submit"
        class="btn btn-primary"
        :disabled="selectedCountries.length === 0"
      >
        Compare
      </button>
      <span id="compare-spinner" class="htmx-indicator loading loading-spinner loading-sm"></span>
    </div>
  </form>
</div>
