<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}GeoLearnr{% endblock %}</title>

    <!-- DaisyUI (includes Tailwind CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <!-- HTMX SSE extension -->
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js" defer></script>
    <!-- Alpine.js -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  </head>
  <body class="min-h-screen bg-base-100">
    <nav class="navbar bg-base-200 shadow-sm">
      <div class="navbar-start">
        <a href="/" class="btn btn-ghost text-xl font-bold">GeoLearnr</a>
      </div>
      <div class="navbar-end">
        {% block navbar_end %}{% endblock %}
      </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
