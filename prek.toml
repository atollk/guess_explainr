minimum_prek_version = "0.1.0"

# Ruff – linting + formatting
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.11.6"

[[repos.hooks]]
id = "ruff"
args = ["--fix"]

[[repos.hooks]]
id = "ruff-format"

# Pyrefly – type checking
[[repos]]
repo = "https://github.com/facebook/pyrefly-pre-commit"
rev = "v0.16.0"

[[repos.hooks]]
id = "pyrefly-check"
language = "system"
pass_filenames = false

# Built-in prek hooks (fast, no extra env)
[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-merge-conflict"
